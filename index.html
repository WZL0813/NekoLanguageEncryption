<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵语加密器 | MeowCrypt</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B8A;
            --primary-light: #FFB3C1;
            --secondary: #FFE66D;
            --bg-light: #FFF5F7;
            --bg-card: #FFFFFF;
            --text-dark: #2D3436;
            --text-light: #636E72;
            --border: #FDECEE;
            --success: #00B894;
            --shadow: rgba(255, 107, 138, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            background-image:
                radial-gradient(circle at 20% 80%, rgba(255, 107, 138, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 230, 109, 0.1) 0%, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 0.5rem;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: var(--primary);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px var(--shadow);
            border: 1px solid var(--border);
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        .label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .label-text {
            font-weight: 500;
            color: var(--text-dark);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .label-icon {
            font-size: 1.2rem;
        }

        .char-count {
            font-size: 0.8rem;
            color: var(--text-light);
            background: var(--bg-light);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: #FFFEFC;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 107, 138, 0.1);
        }

        textarea::placeholder {
            color: #B2BEC3;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 1.5rem 0;
        }

        .btn {
            padding: 0.85rem 2rem;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #FF8FA3 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 138, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 138, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: white;
        }

        .btn-icon {
            background: var(--bg-light);
            color: var(--text-light);
            padding: 0.85rem;
            border: none;
        }

        .btn-icon:hover {
            background: var(--border);
            color: var(--primary);
        }

        .output-group {
            position: relative;
        }

        .output-group textarea {
            background: #FFFEF9;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--primary);
            line-height: 1.8;
        }

        .copy-btn {
            position: absolute;
            right: 12px;
            top: 50px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .copy-btn:hover {
            background: #FF4D6D;
            transform: scale(1.05);
        }

        .copy-btn.copied {
            background: var(--success);
        }

        .info-box {
            background: linear-gradient(135deg, #FFF9E6 0%, #FFF3D0 100%);
            border: 1px solid #FFE58F;
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1.25rem;
            font-size: 0.85rem;
            color: #856404;
            line-height: 1.6;
        }

        .info-box strong {
            color: #B7791F;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px dashed var(--border);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 0.2rem;
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            color: var(--text-light);
            font-size: 0.85rem;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }

            h1 {
                font-size: 1.6rem;
            }

            .card {
                padding: 1.25rem;
            }

            .btn {
                padding: 0.75rem 1.5rem;
                font-size: 0.9rem;
            }

            .actions {
                flex-direction: column;
            }

            .actions .btn {
                width: 100%;
                justify-content: center;
            }
        }

        .cat-decoration {
            position: fixed;
            font-size: 3rem;
            opacity: 0.1;
            pointer-events: none;
            z-index: -1;
        }

        .cat-1 { top: 10%; left: 5%; transform: rotate(-15deg); }
        .cat-2 { bottom: 15%; right: 8%; transform: rotate(10deg); }
    </style>
</head>
<body>
    <div class="cat-decoration cat-1">🐱</div>
    <div class="cat-decoration cat-2">🐈</div>

    <div class="container">
        <header>
            <div class="logo">🐾</div>
            <h1>喵语加密器</h1>
            <p class="subtitle">将文字转换为可爱的喵~加密语言</p>
        </header>

        <div class="card">
            <div class="input-group">
                <div class="label">
                    <span class="label-text">
                        <span class="label-icon">✍️</span>
                        输入文本
                    </span>
                    <span class="char-count" id="inputCount">0 字符</span>
                </div>
                <textarea
                    id="inputText"
                    placeholder="在这里输入要加密的文字... 支持中文、英文、emoji等所有Unicode字符"
                ></textarea>
            </div>

            <div class="actions">
                <button class="btn btn-primary" id="encodeBtn" onclick="encodeText()">
                    <span>🔐</span> 加密
                </button>
                <button class="btn btn-secondary" id="decodeBtn" onclick="decodeText()">
                    <span>🔓</span> 解密
                </button>
                <button class="btn btn-icon" onclick="clearAll()" title="清空">
                    <span>🗑️</span>
                </button>
            </div>

            <div class="input-group output-group">
                <div class="label">
                    <span class="label-text">
                        <span class="label-icon">🐱</span>
                        转换结果
                    </span>
                    <span class="char-count" id="outputCount">0 字符</span>
                </div>
                <textarea
                    id="outputText"
                    placeholder="转换结果将显示在这里..."
                    readonly
                ></textarea>
                <button class="copy-btn" id="copyBtn" onclick="copyResult()">
                    <span>📋</span> 复制
                </button>
            </div>

            <div class="stats" id="stats" style="display: none;">
                <div class="stat-item">
                    <div class="stat-value" id="originalLength">0</div>
                    <div class="stat-label">原文长度</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="encodedLength">0</div>
                    <div class="stat-label">加密长度</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="compressionRatio">0%</div>
                    <div class="stat-label">压缩率</div>
                </div>
            </div>

            <div class="info-box">
                <strong>💡 使用说明：</strong><br>
                • 加密：将普通文字转换为"喵~"格式的加密语言<br>
                • 解密：将"喵~"加密语言还原为原文<br>
                • 规则：相邻喵~之间只能有一个~，喵可以多个<br>
                • 支持所有Unicode字符（中文、英文、emoji等）
            </div>
        </div>

        <footer>
            <p>Made with 🐾 by Ryokuryuneko</p>
        </footer>

    <script>
        // 加密算法：将Unicode字符转换为喵~格式
        // 使用UTF-8编码思想，将字符转为字节数组，再用Base-4喵~表示
        function encodeText() {
            const input = document.getElementById('inputText').value;
            if (!input) {
                alert('请先输入要加密的内容！');
                return;
            }

            // 将字符串转换为UTF-8字节数组
            const bytes = [];
            for (let i = 0; i < input.length; i++) {
                const codePoint = input.codePointAt(i);

                // UTF-8编码规则
                if (codePoint < 0x80) {
                    // 1字节: 0xxxxxxx
                    bytes.push(codePoint);
                } else if (codePoint < 0x800) {
                    // 2字节: 110xxxxx 10xxxxxx
                    bytes.push(0xC0 | (codePoint >> 6));
                    bytes.push(0x80 | (codePoint & 0x3F));
                } else if (codePoint < 0x10000) {
                    // 3字节: 1110xxxx 10xxxxxx 10xxxxxx
                    bytes.push(0xE0 | (codePoint >> 12));
                    bytes.push(0x80 | ((codePoint >> 6) & 0x3F));
                    bytes.push(0x80 | (codePoint & 0x3F));
                } else {
                    // 4字节: 11110xxx 10xxxxxx 10xxxxxx 10xxxxxx
                    bytes.push(0xF0 | (codePoint >> 18));
                    bytes.push(0x80 | ((codePoint >> 12) & 0x3F));
                    bytes.push(0x80 | ((codePoint >> 6) & 0x3F));
                    bytes.push(0x80 | (codePoint & 0x3F));
                }

                // 对于超出BMP的字符，需要跳过代理对
                if (codePoint > 0xFFFF) {
                    i++;
                }
            }

            // 将字节数组编码成一个巨大的数字（每个字节作为256进制的一位）
            let bigNumber = 0n;
            for (const byte of bytes) {
                bigNumber = bigNumber * 256n + BigInt(byte);
            }

            // 将大数字转换为Base-4字符串
            let base4 = '';
            if (bigNumber === 0n) {
                base4 = '0';
            } else {
                while (bigNumber > 0n) {
                    const digit = Number(bigNumber % 4n);
                    base4 = digit.toString() + base4;
                    bigNumber = bigNumber / 4n;
                }
            }

            // 将Base-4数字转换为喵序列
            // 0=喵, 1=喵喵, 2=喵喵喵, 3=喵喵喵喵
            let result = '';
            for (let i = 0; i < base4.length; i++) {
                const digit = parseInt(base4[i]);
                const meowCount = digit + 1;
                result += '喵'.repeat(meowCount);
                if (i < base4.length - 1) {
                    result += '~';
                }
            }

            document.getElementById('outputText').value = result;
            updateStats(input.length, result.length);
            updateOutputCount(result.length);
        }

        // 解密算法：将喵~格式还原为Unicode字符
        function decodeText() {
            const input = document.getElementById('inputText').value.trim();
            if (!input) {
                alert('请先输入要解密的内容！');
                return;
            }

            // 验证输入是否只包含喵和~
            if (!/^[喵~]+$/.test(input)) {
                alert('解密失败！输入包含无效字符，请输入正确的喵~加密语言！');
                return;
            }

            // 将喵序列转换回Base-4数字
            const segments = input.split('~');
            let base4 = '';
            for (const seg of segments) {
                const meowCount = seg.length;
                const digit = meowCount - 1;
                if (digit >= 0 && digit <= 3) {
                    base4 += digit.toString();
                }
            }

            if (!base4) {
                alert('解密失败！请检查输入的喵~语言是否正确！');
                return;
            }

            // 将Base-4转换回大数字
            let bigNumber = 0n;
            for (let i = 0; i < base4.length; i++) {
                const digit = parseInt(base4[i]);
                bigNumber = bigNumber * 4n + BigInt(digit);
            }

            // 将大数字转换回字节数组
            const bytes = [];
            while (bigNumber > 0n) {
                const byte = Number(bigNumber % 256n);
                bytes.unshift(byte);
                bigNumber = bigNumber / 256n;
            }

            // 处理空字节数组
            if (bytes.length === 0) {
                document.getElementById('outputText').value = '';
                updateStats(0, input.length);
                updateOutputCount(0);
                return;
            }

            // 将UTF-8字节数组转换回字符串
            let result = '';
            let i = 0;
            while (i < bytes.length) {
                const byte = bytes[i];

                let codePoint;
                let numBytes;

                if ((byte & 0x80) === 0) {
                    // 1字节: 0xxxxxxx
                    codePoint = byte;
                    numBytes = 1;
                } else if ((byte & 0xE0) === 0xC0) {
                    // 2字节: 110xxxxx
                    if (i + 1 >= bytes.length) break;
                    codePoint = ((byte & 0x1F) << 6) | (bytes[i + 1] & 0x3F);
                    numBytes = 2;
                } else if ((byte & 0xF0) === 0xE0) {
                    // 3字节: 1110xxxx
                    if (i + 2 >= bytes.length) break;
                    codePoint = ((byte & 0x0F) << 12) | ((bytes[i + 1] & 0x3F) << 6) | (bytes[i + 2] & 0x3F);
                    numBytes = 3;
                } else if ((byte & 0xF8) === 0xF0) {
                    // 4字节: 11110xxx
                    if (i + 3 >= bytes.length) break;
                    codePoint = ((byte & 0x07) << 18) | ((bytes[i + 1] & 0x3F) << 12) | ((bytes[i + 2] & 0x3F) << 6) | (bytes[i + 3] & 0x3F);
                    numBytes = 4;
                } else {
                    // 无效字节，跳过
                    i++;
                    continue;
                }

                if (codePoint >= 0) {
                    result += String.fromCodePoint(codePoint);
                }
                i += numBytes;
            }

            if (result) {
                document.getElementById('outputText').value = result;
                updateStats(result.length, input.length);
                updateOutputCount(result.length);
            } else {
                alert('解密失败！请检查输入的喵~语言是否正确！');
            }
        }

        // 将数字转换为Base-4字符串
        function toBase4(num) {
            if (num === 0) return '0';
            let result = '';
            while (num > 0) {
                result = (num % 4).toString() + result;
                num = Math.floor(num / 4);
            }
            return result;
        }

        // 复制结果
        function copyResult() {
            const output = document.getElementById('outputText');
            if (!output.value) return;

            navigator.clipboard.writeText(output.value).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerHTML = '<span>✓</span> 已复制';
                btn.classList.add('copied');

                setTimeout(() => {
                    btn.innerHTML = '<span>📋</span> 复制';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // 清空
        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('outputText').value = '';
            document.getElementById('inputCount').textContent = '0 字符';
            document.getElementById('outputCount').textContent = '0 字符';
            document.getElementById('stats').style.display = 'none';
        }

        // 更新输入字符计数
        document.getElementById('inputText').addEventListener('input', function() {
            const count = this.value.length;
            document.getElementById('inputCount').textContent = count + ' 字符';
        });

        // 更新输出字符计数
        function updateOutputCount(count) {
            document.getElementById('outputCount').textContent = count + ' 字符';
        }

        // 更新统计信息
        function updateStats(original, encoded) {
            document.getElementById('stats').style.display = 'flex';
            document.getElementById('originalLength').textContent = original;
            document.getElementById('encodedLength').textContent = encoded;

            // 计算压缩率 (加密后/原文) 或 膨胀率
            const ratio = original > 0 ? Math.round((encoded / original) * 100) : 0;
            document.getElementById('compressionRatio').textContent = ratio + '%';
        }

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'Enter') {
                    encodeText();
                }
            }
        });
    </script>

<script>
/**
 * Iframe 元素高亮注入脚本
 * 需要在目标网站中引入此脚本来支持跨域 iframe 高亮功能
 *
 * 使用方法：
 * 1. 将此脚本添加到目标网站的 HTML 中
 * 2. 或通过浏览器扩展、用户脚本等方式注入
 */

(function () {
  "use strict";

  // 检查是否在 iframe 中
  if (window.self === window.top) {
    return; // 不在 iframe 中，不执行
  }

  // 检查是否已经初始化过
  if (window.__iframeHighlightInitialized) {
    return;
  }
  window.__iframeHighlightInitialized = true;
  console.log("Iframe 高亮脚本已加载");

  // 创建高亮覆盖层
  var overlay = document.createElement("div");
  overlay.id = "iframe-highlight-overlay";
  overlay.style.cssText = "\n    position: fixed;\n    top: 0;\n    left: 0;\n    width: 100vw;\n    height: 100vh;\n    pointer-events: none;\n    z-index: 999999;\n    overflow: hidden;\n  ";
